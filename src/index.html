<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sleep Outside | Home</title>
    <link rel="stylesheet" href="/css/style.css" />

    <script type="module" src="js/main.js"></script>
  </head>

  <body>
    <header class="divider" id="main-header">
      <!-- Dynamically loaded -->
    </header>
    <main class="divider">
      <div class="hero">
        <img
          src="/images/banner-sm.jpg"
          srcset="images/banner-sm.jpg 500w, images/banner.jpg"
          alt="image of a high mountain lake"
        />
        <div class="logo logo--square">
          <img src="/images/noun_Tent_2517.svg" alt="tent image for logo" />
          <div>Sleep<span class="highlight">Outside</span></div>
        </div>
        <div class="mission">
          <p>
            Our mission is to provide you with everything you need to sleep
            outside comfortably at an affordable price.
          </p>
        </div>
      </div>

      <section class="product-categories">
        <figure>
          <a href="/product_listing/?category=tents" class="category-logo">
            <img src="/images/icons/category-tents.svg" loading="lazy" alt="A Tent icon to view all available Tents products">
          </a>
          <figcaption>Tents</figcaption>
        </figure>
        <figure>
          <a href="/product_listing/?category=backpacks" class="category-logo">
            <img src="/images/icons/category-backpacks.svg" loading="lazy" alt="A Backpack icon to view all available Backpacks products">
          </a>
          <figcaption>Backpacks</figcaption>
        </figure>
        <figure>
          <a href="/product_listing/?category=sleeping-bags" class="category-logo">
            <img src="/images/icons/category-sleepingbags.svg" loading="lazy" alt="A Sleeping bag icon to view all available Sleeping bag products">
          </a>
          <figcaption>Sleeping Bags</figcaption>
        </figure>
        <figure>
          <a href="/product_listing/?category=hammocks" class="category-logo">
            <img src="/images/icons/category-hammocks.svg" loading="lazy" alt="A hammock icon to view all available hammock products">
          </a>
          <figcaption>Hammocks</figcaption>
        </figure>
      </section>

      <section class="products">
        <h2>Top Products</h2>
        <!-- Product list dynamically loaded -->
        <ul id="product-list" class="product-list">
          <!-- Product cards dynamically loaded -->
        </ul>
      </section>
    </main>
    <footer id="main-footer">
      <!-- Dynamically loaded -->
    </footer>
  </body>
</html>
