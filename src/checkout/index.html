<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Sleep Outside | Checkout</title>

    <link rel="stylesheet" href="/css/style.css" />
    <script type="module" src="/js/checkout.js" defer></script>
  </head>

  <body>
    <header class="divider" id="head"></header>

    <main class="divider">
      <div class="check-form">
      <section class="products">
        <h2>Review & Place your Order</h2>
        <form action="POST">
          <Fieldset>
            <legend>Name</legend>
            <Label>First Name<Input type="text" name="fname" required></Input></Label>
            <Label>Last Name<Input type="text" name="lname" required></Input></Label>
          </Fieldset>
          <fieldset>
            <legend>Address</legend>
            <Label>Street Address<Input type="text" name="street" required></Input></Label>
            <Label>City<Input type="text" name="city" required></Input></Label>
            <Label>State<Input type="text" name="state" required></Input></Label>
            <Label>Zip-Code<Input type="number" name="zipCode" required></Input></Label>
          </fieldset>
          <fieldset>
            <legend>Payment</legend>
            <Label>Credit Card Number<Input type="number" name="CCnum" required></Input></Label>
            <Label>Expiration Date<Input type="number" name="ExpirDate" required></Input></Label>
            <Label>Security Code<Input type="number" name="SecCode" required></Input></Label>
          </fieldset>
        </form>
      </section>
      <section class="cart-summary">
        <p>Subtotal:</p>
        <!--have a list of the current items in cart with price-->
        <p>Tax: </p>
        <p>Shipping Estimate</p>
        <p class="cart-total">Order Total: <span id="total-amount"></span></p>
        <button>Checkout</button>
      </section>
      </div>
    </main>

    <footer id="foot">&copy;NOT a real business</footer>
  </body>
</html>
