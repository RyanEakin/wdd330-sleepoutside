<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Sleep Outside | Checkout</title>

    <link rel="stylesheet" href="/css/style.css" />
    <script type="module" src="../js/checkout.js"></script>
  </head>

  <body>
    <header class="divider" id="head">
      <!-- dynamically loaded -->
    </header>

    <main class="divider">
      <section class="products">
        <h2>Review & Place your Order</h2>
        <div class="checkout-layout">
          <form id="checkout-form">
            <fieldset>
              <legend>Customer Name</legend>
              <label for="fname">First Name
                <input type="text" name="fname" required autocomplete="given-name">
              </label>
              <label for="lname">Last Name
                <input type="text" name="lname" required autocomplete="family-name">
              </label>
            </fieldset>

            <fieldset>
              <legend>Address</legend>
              <label for="street">Street Address
                <input type="text" name="street" required autocomplete="street-address">
              </label>
              <label for="city">City
                <input type="text" name="city" required autocomplete="address-level2">
              </label>
              <label for="state">State
                <input type="text" name="state" required maxlength="2" autocomplete="address-level1">
              </label>
              <label for="zip">Zip Code
                <input type="text" name="zip" id="zip" required pattern="[0-9]{5}" autocomplete="postal-code">
              </label>
            </fieldset>

            <fieldset>
              <legend>Payment</legend>
              <label for="cardNumber">Credit Card Number
                <input type="text" name="cardNumber" required pattern="[0-9]{16}" maxlength="16" autocomplete="cc-number">
              </label>
              <label for="expiration">Expiration Date
                <input type="text" name="expiration" required placeholder="MM/YY" autocomplete="cc-exp">
              </label>
              <label for="code">Security Code
                <input type="text" name="code" required pattern="[0-9]{3,4}" maxlength="4" autocomplete="cc-csc">
              </label>
            </fieldset>

            <button type="button" id="checkoutSubmit">Place Order</button>
          </form>

          <div class="order-summary" id="order-summary">
            <h3>Order Summary</h3>
            <p>Items (<span id="item-count">0</span>): <span id="subtotal">$0.00</span></p>
            <p>Tax: <span id="tax">$0.00</span></p>
            <p>Shipping: <span id="shipping">$0.00</span></p>
            <p><strong>Order Total: <span id="order-total">$0.00</span></strong></p>
          </div>
        </div>
      </section>
    </main>

    <footer id="foot">
      <!-- dynamically loaded -->
    </footer>
  </body>
</html>
