<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Sleep Outside | Checkout</title>

    <link rel="stylesheet" href="/css/style.css" />
    <script type="module" src="/js/checkout.js" defer></script>
  </head>

  <body>
    <header class="divider" id="head"></header>

    <main class="divider">
      <div class="check-form">
      <section class="products">
        <h2>Review & Place your Order</h2>
        <form action="/checkout/success.html" id="checkout-form">
          <Fieldset>
            <legend>Name</legend>
            <Label>First Name<Input type="text" name="fname" required></Input></Label>
            <Label>Last Name<Input type="text" name="lname" required></Input></Label>
          </Fieldset>
          <fieldset>
            <legend>Address</legend>
            <Label>Street Address<Input type="text" name="street" required></Input></Label>
            <Label>City<Input type="text" name="city" required></Input></Label>
            <Label>State<Input type="text" name="state" required></Input></Label>
            <Label>Zip-Code<Input type="text" name="zip" required></Input></Label>
          </fieldset>
          <fieldset>
            <legend>Payment</legend>
            <Label>Credit Card Number<Input type="text" name="cardNumber" value="1234123412341234" required></Input></Label>
            <Label>Expiration Date<Input type="text" name="expiration" required></Input></Label>
            <Label>Security Code<Input type="text" name="SecCode" value="123" required></Input></Label>
          </fieldset>
        </form>
      </section>
      <section class="cart-summary">
        <p class="cart-total">Subtotal: <span id="total-amount"></span></p>
        <ul class="product-list">Subtotal:</ul>
        <!--have a list of the current items in cart with price-->
        <p>Tax: <span id="tax"></span></p>
        <p>Shipping Estimate: <span id="ship"></span></p>
        <p>Total: <span id="orderTotal"></span></p>
          <button type="submit" form="checkout-form" action="/checkout/success.html" id="checkingOut">Checkout</button>
      </section>
      </div>
      
    </main>

    <footer id="foot">&copy;NOT a real business</footer>
  </body>
</html>
