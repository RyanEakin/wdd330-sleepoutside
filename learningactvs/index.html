<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>

  <body>
    <main>
      <!-- display the countdown timer -->

      <h1 id="countdown"></h1>

      <p>
        This activity allows you to set a countdown time for an event or task.
      </p>
      <input
        type="text"
        id="task"
        name="task"
        placeholder="Enter your task here"
      />
      <form>
        <!--Add a button to start the countdown-->
        <button type="button" id="startCountdown">Start Countdown</button>
        <button type="button" id="pauseResumeCountdown">Pause</button>
        <button type="button" id="resetCountdown">Reset</button>
        <label for="time">Choose a time:</label>
        <input type="time" id="time" name="timecountdown" required />
        <!-- <input type="submit" value="Set Timecountdown">-->
      </form>
    </main>
    <script src="./scripts/timeout-interval.js"></script>
  </body>
</html>
